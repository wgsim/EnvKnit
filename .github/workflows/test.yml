name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: pip install -e ".[dev,cli]"

      - name: Run tests
        run: pytest --tb=short -q

      - name: Build envknit CLI
        if: matrix.python-version == '3.11'
        run: cargo build --manifest-path crates/envknit-cli/Cargo.toml

      - name: Integration test — envknit lock with uv
        if: matrix.python-version == '3.11'
        run: |
          mkdir -p /tmp/lock-test && cd /tmp/lock-test
          printf 'environments:\n  default:\n    packages:\n      - requests>=2.28\n' > envknit.yaml
          $GITHUB_WORKSPACE/target/debug/envknit lock
          grep 'resolver_version:.*uv/' envknit.lock.yaml

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore

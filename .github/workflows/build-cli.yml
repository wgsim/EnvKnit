name: Build CLI Binary

# Triggers:
#   push/PR to main — build for smoke testing
#   tag push vX.Y.Z — build and upload to GitHub Release
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]

jobs:
  test-rust:
    name: Test Rust CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Ubuntu)
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Run tests
        run: cargo test --manifest-path crates/envknit-cli/Cargo.toml

  build-rust:
    name: Build Rust CLI (${{ matrix.os }})
    needs: test-rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: envknit-linux-amd64
            binary_path: target/release/envknit
          - os: macos-latest
            artifact_name: envknit-macos-amd64
            binary_path: target/release/envknit
          - os: windows-latest
            artifact_name: envknit-windows-amd64.exe
            binary_path: target/release/envknit.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install system dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --manifest-path crates/envknit-cli/Cargo.toml

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./target/release/envknit --version
          ./target/release/envknit --help

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          & ".\target\release\envknit.exe" --version
          & ".\target\release\envknit.exe" --help

      - name: Rename artifact
        shell: bash
        run: cp "${{ matrix.binary_path }}" "${{ matrix.artifact_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 7

  # ── Release upload ──────────────────────────────────────────────────────────
  # Only runs on version tag pushes (e.g., v1.0.0)
  release:
    name: Upload to GitHub Release
    needs: [build-rust]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/envknit-linux-amd64/envknit-linux-amd64
            artifacts/envknit-macos-amd64/envknit-macos-amd64
            artifacts/envknit-windows-amd64.exe/envknit-windows-amd64.exe
          draft: false
